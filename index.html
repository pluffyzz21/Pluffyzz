<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pluffyzz </title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --fondo: #FFF8FB;
    --azul: #0CC0DF;
    --blanco: #FFFFFF;
}

body {
    font-family: 'Fredoka', sans-serif;
    margin: 0;
    background: var(--fondo);
}

/* NAV */
nav {
    background: var(--azul);
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BOTÓN CARRITO */
.btn-cart {
    position: relative;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid white;
    background: white;
    color: var(--azul);
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* CONTADOR */
.contador {
    position: absolute;
    top: -5px;
    right: -5px;
    background: #FF4D4D;
    color: white;
    font-size: 12px;
    padding: 3px 7px;
    border-radius: 50%;
    font-weight: bold;
}

/* HERO */
.hero-pro {
    background: white;
    border-bottom: 2px solid #eee;
    display: flex;
    justify-content: space-between;
    padding: 50px;
    align-items: center;
}

/* LOGO GRANDE */
.logo {
    font-size: 150px;
    font-weight: 950;
    color: #0CC0DF; /* aqua */
    -webkit-text-stroke: 4px black;
    text-shadow:
        6px 6px 0px #000,
        10px 10px 0px rgba(0,0,0,0.3);
    letter-spacing: 6px;
    line-height: 1;
}

/* SUBTÍTULO */
.subtitle {
    font-size: 80px;
    font-weight: 900;
    color: var(--azul);
    letter-spacing: 4px;
    margin-top: 10px;
    text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
}

/* LOGO IMAGEN */
.logo-img {
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 50%;
    border: 6px solid white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .logo {
        font-size: 60px;
    }

    .subtitle {
        font-size: 22px;
    }
}

/* CATALOGO */
.catalogo {
    background: #f9f9f9;
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 60px;
    flex-wrap: wrap;
}

.card {
    position: relative;
    cursor: pointer;
    background: white;
    padding: 15px;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.card img {
    width: 250px;
    height: 250px;
    object-fit: contain;
    border-radius: 25px;
}
.pasto {
    width: 100%;
    height: 90px;
    background: url('pasto.png') repeat-x;
    background-size: auto 100%;
    margin-top: -10px;
}
/* PRECIO ENCIMA */
.info {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(27, 60, 115, 0.95);
    color: white;
    padding: 10px 15px;
    border-radius: 20px;
    z-index: 10;
    display: inline-block;
}

/* OVERLAY */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 5;
}

#overlay.activo {
    opacity: 1;
    pointer-events: all;
}

/* CARRITO */
#carrito {
    position: fixed;
    left: 0;
    bottom: -100%;
    width: 100%;
    height: 85%;
    background: white;
    border-radius: 30px 30px 0 0;
    padding: 20px;
    transition: 0.4s;
    overflow-y: auto;
    z-index: 10;
}

#carrito.activo {
    bottom: 0;
}

.cerrar {
    background: red;
    color: white;
    border-radius: 10px;
    padding: 10px;
}

/* WHATSAPP */
.btn-wa {
    position: fixed;
    bottom: 25px;
    right: 25px;

    width: 70px;
    height: 70px;

    border-radius: 50%;
    background: linear-gradient(135deg, #6ECFE3, #4FBAD1);
    color: white;

    font-size: 30px;
    border: none;

    box-shadow: 0 10px 25px rgba(0,0,0,0.2);

    display: flex;
    justify-content: center;
    align-items: center;
    
    transition: 0.3s;
    z-index: 2000;
}

.btn-wa:hover {
    transform: scale(1.1);
}

/* NOTI */
.noti {
    position: fixed;
    bottom: 100px;
    right: 20px;
    background: var(--azul);
    color: white;
    padding: 10px;
    border-radius: 10px;
    opacity: 0;
    transition: 0.3s;
}
/* 📱 MOBILE */
@media (max-width: 768px) {
body {
    overflow-x: hidden;
}
    .hero-pro {
        flex-direction: column;
        text-align: center;
        padding: 30px;
    }

    .logo {
        font-size: 60px;
    }

    .subtitle {
        font-size: 28px;
    }

    .logo-img {
        width: 140px;
        height: 140px;
        margin-top: 20px;
    }

    .catalogo {
        gap: 20px;
        padding: 20px;
    }

/* 🪟 MODAL RESPONSIVE PRO */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);

    display: flex;
    justify-content: center;
    align-items: flex-end;

    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 999;
}

.modal.activo {
    opacity: 1;
    pointer-events: all;
}

/* 📱 MOBILE */
.modal-content {
    background: white;
    width: 100%;
    max-width: 400px;
    border-radius: 25px 25px 0 0;
    padding: 25px;
    text-align: center;

    transform: translateY(100%);
    transition: 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.modal.activo .modal-content {
    transform: translateY(0);
}

/* 💻 DESKTOP */
@media (min-width: 769px) {

    .modal {
        align-items: center;
    }

    .modal-content {
        border-radius: 25px;
        max-width: 420px;
        transform: scale(0.8);
        opacity: 0;
    }

    .modal.activo .modal-content {
        transform: scale(1);
        opacity: 1;
    }
}

/* IMAGEN */
.modal-content img {
    width: 100%;
    border-radius: 20px;
}

/* BOTÓN */
.modal-content button {
    background: #6ECFE3;
    border: none;
    padding: 12px 20px;
    border-radius: 15px;
    color: white;
    margin-top: 10px;
    font-size: 16px;
    cursor: pointer;
}
.barra {
    width: 50px;
    height: 5px;
    background: #ccc;
    border-radius: 10px;
    margin: 0 auto 15px;
}
</style>
</head>

<body>

<nav>
    <h2>Pluffyzz </h2>

    <button class="btn-cart" onclick="toggleCarrito()">
        🛒
        <span class="contador" id="contador">0</span>
    </button>
</nav>

<section class="hero-pro">
    <div>
        <h1 class="logo">PLUFFYZZ</h1>
        <h2 class="subtitle">PLUSH TOY FARM</h2>
    </div>

    <img src="pluffyzz.png" class="logo-img">
</section>
<div class="pasto"></div>
<section class="catalogo">

<div class="card" onclick="abrirModal('conejo')">
<img src="conejo.png">
<div class="info">FUNNY BUNNY - $350</div>
</div>

<div class="card" onclick="abrirModal('elefante')">
<img src="elefante.png">
<div class="info">ELEFUN - $350</div>
</div>

<div class="card" onclick="abrirModal('oso')">
<img src="oso.png">
<div class="info">CLOUDY BEAR - $350</div>
</div>

<div class="card" onclick="abrirModal('pinguino')">
<img src="pinguino.png">
<div class="info">PINGU - $350</div>
</div>

</section>
<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content" id="modal-content">
        <div class="barra"></div>
    
<div id="overlay" onclick="toggleCarrito()"></div>

<div id="carrito">
<button class="cerrar" onclick="toggleCarrito()">Cerrar</button>
<h2>Carrito</h2>
<div id="lista"></div>
<h3>Total: $<span id="total">0</span></h3>
</div>

<button class="btn-wa" onclick="pagar()">💬</button>

<div id="notificacion" class="noti"></div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let total = 0;

function guardarCarrito(){
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

function agregar(nombre, precio){
    let existente = carrito.find(item => item.nombre === nombre);

    if(existente){
        existente.cantidad++;
    } else {
        carrito.push({nombre, precio, cantidad: 1});
    }

    guardarCarrito();
    render();
    actualizarContador();
    mostrarNotificacion(nombre + " añadido");
}

function render(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";
    total = 0;

    carrito.forEach((item, index)=>{
        let subtotal = item.precio * item.cantidad;
        total += subtotal;

        lista.innerHTML += `
        <div>
            ${item.nombre} x${item.cantidad} - $${subtotal}
            <button onclick="cambiarCantidad(${index},1)">+</button>
            <button onclick="cambiarCantidad(${index},-1)">-</button>
            <button onclick="eliminar(${index})">❌</button>
        </div>`;
    });

    document.getElementById("total").textContent = total;
}

function cambiarCantidad(index, cambio){
    carrito[index].cantidad += cambio;
    if(carrito[index].cantidad <= 0){
        carrito.splice(index,1);
    }
    guardarCarrito();
    render();
}

function eliminar(index){
    carrito.splice(index,1);
    guardarCarrito();
    render();
}

function actualizarContador(){
    document.getElementById("contador").textContent = carrito.length;
}

function toggleCarrito(){
    document.getElementById("carrito").classList.toggle("activo");
    document.getElementById("overlay").classList.toggle("activo");
}

function mostrarNotificacion(texto){
    let n = document.getElementById("notificacion");
    n.textContent = texto;
    n.style.opacity = "1";
    setTimeout(()=> n.style.opacity="0",2000);
}

function pagar(){
    let mensaje = "Hola quiero comprar:%0A";

    carrito.forEach(item=>{
        mensaje += item.nombre + " x" + item.cantidad + "%0A";
    });

    let telefono = "524271650743";
    window.location.href = "https://wa.me/"+telefono+"?text="+mensaje;
}

render();
actualizarContador();

function abrirModal(tipo){

    let contenido = "";

    if(tipo === "conejo"){
        contenido = `
        <img src="conejo.png">
        <h2>Funny Bunny </h2>
        <p>Súper suave y adorable</p>
        <p><strong>$350 MXN</strong></p>
        <button onclick="agregar('Conejo Soft',350)">Agregar al carrito</button>
        `;
    }

    if(tipo === "elefante"){
        contenido = `
        <img src="elefante.png">
        <h2>Elefun </h2>
        <p>Perfecto para abrazar</p>
        <p><strong>$350 MXN</strong></p>
        <button onclick="agregar('Elefante Puffy',350)">Agregar al carrito</button>
        `;
    }

    if(tipo === "oso"){
        contenido = `
        <img src="oso.png">
        <h2>Cloudy Bear </h2>
        <p>El más clásico y tierno</p>
        <p><strong>$350 MXN</strong></p>
        <button onclick="agregar('Oso Puffy',350)">Agregar al carrito</button>
        `;
    }

    if(tipo === "pinguino"){
        contenido = `
        <img src="pinguino.png">
        <h2>Pingu Puff 🐧</h2>
        <p>Frío por fuera, suave por dentro</p>
        <p><strong>$350 MXN</strong></p>
        <button onclick="agregar('Pinguino Puffy',350)">Agregar al carrito</button>
        `;
    }

    document.getElementById("modal-content").innerHTML = contenido;
    document.getElementById("modal").classList.add("activo");
}

/* cerrar modal */
document.getElementById("modal").addEventListener("click", function(e){
    if(e.target.id === "modal"){
        this.classList.remove("activo");
    }
});

let startY = 0;
let endY = 0;

const modal = document.getElementById("modal");
const contenido = document.getElementById("modal-content");

contenido.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
});

contenido.addEventListener("touchmove", (e) => {
    endY = e.touches[0].clientY;

    let diff = endY - startY;

    if(diff > 0){
        contenido.style.transform = `translateY(${diff}px)`;
    }
});

contenido.addEventListener("touchend", () => {
    let diff = endY - startY;

    if(diff > 100){
        modal.classList.remove("activo");
        contenido.style.transform = "";
    } else {
        contenido.style.transform = "translateY(0)";
    }
});
</script>

</body>
</html>
