<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pluffyzz </title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --color-principal: #6BCB77;
    --fondo: #FFF8FB;
    --azul: #1B3C73;
    --amarillo: #FFE066;
}

body {
    font-family: 'Fredoka', sans-serif;
    margin: 0;
    background: var(--fondo);
}

/* NAV */
nav {
    background: var(--azul);
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

/* HERO */
.hero-pro {
    background: var(--amarillo);
    display: flex;
    justify-content: space-between;
    padding: 50px;
}

/* LOGO */
.logo {
    font-size: 70px;
    font-weight: 900;
    color: var(--amarillo);
    -webkit-text-stroke: 3px black;
    text-shadow: 4px 4px #000;
}

/* CATALOGO */
.catalogo {
    background: var(--amarillo);
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 60px;
    flex-wrap: wrap;
}

.card {
    cursor: pointer;
}

.card img {
    width: 250px;
    height: 350px;
    border-radius: 30px;
}

.info {
    background: var(--azul);
    color: white;
    padding: 10px;
    border-radius: 20px;
    margin-top: -40px;
    text-align: center;
}

/* CARRITO */
#carrito {
    position: fixed;
    left: 0;
    bottom: -100%;
    width: 100%;
    height: 85%;
    background: white;
    border-radius: 30px 30px 0 0;
    padding: 20px;
    transition: 0.4s;
    overflow-y: auto;
}

#carrito.activo {
    bottom: 0;
}

.cerrar {
    background: red;
    color: white;
    border-radius: 10px;
    padding: 10px;
}

/* BOTÓN WHATSAPP */
.btn-wa {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6BCB77, #4CAF50);
    color: white;
    font-size: 28px;
    border: none;
    z-index: 9999;
}

/* NOTI */
.noti {
    position: fixed;
    bottom: 100px;
    right: 20px;
    background: var(--azul);
    color: white;
    padding: 10px;
    border-radius: 10px;
    opacity: 0;
    transition: 0.3s;
}
</style>
</head>

<body>

<nav>
    <h2>Pluffyzz </h2>
    <button onclick="toggleCarrito()">🛒 (<span id="contador">0</span>)</button>
</nav>

<section class="hero-pro">
    <div>
        <h1 class="logo">PLUFFYZZ</h1>
        <h2>PLUSH TOY FARM</h2>
    </div>
    <img src="pinguino.png" width="200">
</section>

<section class="catalogo">

<div class="card" onclick="agregar('Conejo Soft',350)">
<img src="conejo.png">
<div class="info">FUNNY BUNNY - $350</div>
</div>

<div class="card" onclick="agregar('Elefante Puffy',350)">
<img src="elefante.png">
<div class="info">ELEFUN - $350</div>
</div>

<div class="card" onclick="agregar('Oso Puffy',350)">
<img src="oso.png">
<div class="info">CLOUDY BEAR - $350</div>
</div>

<div class="card" onclick="agregar('Pinguino Puffy',350)">
<img src="pinguino.png">
<div class="info">PINGU - $350</div>
</div>
  
</section>

<div id="carrito">
<button class="cerrar" onclick="toggleCarrito()">Cerrar</button>
<h2>Carrito</h2>
<div id="lista"></div>
<h3>Total: $<span id="total">0</span></h3>
</div>

<button class="btn-wa" onclick="pagar()">💬</button>

<div id="notificacion" class="noti"></div>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let total = 0;

function guardarCarrito(){
    localStorage.setItem("carrito", JSON.stringify(carrito));
}

function agregar(nombre, precio){
    let existente = carrito.find(item => item.nombre === nombre);

    if(existente){
        existente.cantidad++;
    } else {
        carrito.push({nombre, precio, cantidad: 1});
    }

    guardarCarrito();
    render();
    actualizarContador();
    mostrarNotificacion(nombre + " añadido");
}

function render(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";
    total = 0;

    carrito.forEach((item, index)=>{

        let subtotal = item.precio * item.cantidad;
        total += subtotal;

        lista.innerHTML += `
        <div>
            ${item.nombre} x${item.cantidad} - $${subtotal}
            <button onclick="cambiarCantidad(${index},1)">+</button>
            <button onclick="cambiarCantidad(${index},-1)">-</button>
            <button onclick="eliminar(${index})">❌</button>
        </div>`;
    });

    document.getElementById("total").textContent = total;
}

function cambiarCantidad(index, cambio){
    carrito[index].cantidad += cambio;
    if(carrito[index].cantidad <= 0){
        carrito.splice(index,1);
    }
    guardarCarrito();
    render();
}

function eliminar(index){
    carrito.splice(index,1);
    guardarCarrito();
    render();
}

function actualizarContador(){
    document.getElementById("contador").textContent = carrito.length;
}

function toggleCarrito(){
    document.getElementById("carrito").classList.toggle("activo");
}

function mostrarNotificacion(texto){
    let n = document.getElementById("notificacion");
    n.textContent = texto;
    n.style.opacity = "1";
    setTimeout(()=> n.style.opacity="0",2000);
}

function pagar(){
    let mensaje = "Hola quiero comprar:%0A";

    carrito.forEach(item=>{
        mensaje += item.nombre + " x" + item.cantidad + "%0A";
    });

    let telefono = "521XXXXXXXXXX";
    window.location.href = "https://wa.me/"+telefono+"?text="+mensaje;
}

render();
actualizarContador();
</script>

</body>
</html>
